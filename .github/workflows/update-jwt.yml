name: Update JWT Token

on:
  schedule:
    # 每12小时运行一次
    - cron: '0 */12 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  update-jwt:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: |
        cd scripts
        npm install
        
    - name: Generate new JWT
      run: |
        cd scripts
        echo '${{ secrets.JWT_CONFIG }}' > jwt-config.json
        echo '${{ secrets.PRIVATE_KEY }}' > ed25519-private.pem
        echo "生成JWT token..."
        node generate-jwt.cjs
        echo "检查JWT token文件是否生成..."
        if [ ! -f qweather-jwt-token.txt ]; then
          echo "错误：JWT token文件未生成"
          exit 1
        fi
        echo "JWT token生成成功：$(cat qweather-jwt-token.txt | head -c 50)..."
        
    - name: Update environment file
      run: |
        cd scripts
        NEW_TOKEN=$(cat qweather-jwt-token.txt)
        cd ..
        # 如果.env.local不存在，从.env.example创建
        if [ ! -f .env.local ]; then
          cp .env.example .env.local
        fi
        sed -i "s/REACT_APP_QWEATHER_API_KEY=.*/REACT_APP_QWEATHER_API_KEY=$NEW_TOKEN/" .env.local
        
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .env.local
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Auto-update JWT token - $(date '+%Y-%m-%d %H:%M:%S')"
          git push
          echo "JWT token updated and pushed to repository"
        fi
        
    - name: Verify JWT token update
      run: |
        echo "JWT token has been updated in .env.local"
        echo "The updated token has been committed to the repository"
        echo "Vercel will read the updated token on next deployment"
        
    - name: Trigger Vercel deployment
      run: |
        if [ -n "${{ secrets.VERCEL_DEPLOY_HOOK }}" ]; then
          echo "触发 Vercel 部署..."
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
          echo "Vercel 部署触发成功"
        else
          echo "警告：VERCEL_DEPLOY_HOOK secret 未配置，跳过自动部署"
          echo "请在 GitHub 仓库设置中配置 VERCEL_DEPLOY_HOOK secret"
        fi
        
    - name: Notify success
      run: |
        echo "JWT token updated successfully at $(date)"
        echo "New token expires in 24 hours"